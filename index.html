<!DOCTYPE html>
<html lang="en">
 
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Perfect Shot</title>
 
<style>
 
/* =========================
BASE
========================= */
 
*{
    box-sizing:border-box;
}
 
body{
    margin:0;
    font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background:#e9ecf1;
    color:#111;
}
 
/* CENTER PAGE */
.container{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}
 
/* APP CARD */
.app{
    width:100%;
    max-width:1100px;
    background:#f6f7fb;
    border-radius:18px;
    box-shadow:0 25px 70px rgba(0,0,0,0.18);
    overflow:hidden;
}
 
/* TOP BAR */
.toolbar{
    background:white;
    padding:14px 20px;
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #e5e7eb;
}
 
.brand{
    font-weight:700;
    font-size:14px;
}
 
.mode{
    font-size:12px;
    color:#6b7280;
}
 
/* WORKSPACE */
.workspace{
    padding:30px;
}
 
/* PANELS */
.panel{
    background:white;
    border:1px solid #e5e7eb;
    border-radius:12px;
    padding:16px;
    margin-bottom:16px;
}
 
/* TYPO */
h1{
    font-size:22px;
    margin:0 0 10px 0;
}
 
h2{
    margin:10px 0;
}
 
p{
    font-size:14px;
    color:#4b5563;
    line-height:1.5;
}
 
/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:16px;
}
 
/* CARD */
.card{
    position:relative;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    background:white;
    border:1px solid #e5e7eb;
    transition:0.2s;
}
 
.card:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(0,0,0,0.12);
}
 
.card.selected{
    outline:2px solid #4f46e5;
}
 
/* IMAGE (NO CROPPING ISSUE) */
.card img{
    width:100%;
    height:240px;
    object-fit:contain;
    padding:10px;
    background:#f3f4f6;
    display:block;
}
 
/* LABEL */
.label{
    position:absolute;
    top:10px;
    left:10px;
    background:white;
    border:1px solid #e5e7eb;
    padding:6px 10px;
    border-radius:8px;
    font-size:12px;
    font-weight:600;
}
 
/* BUTTONS */
button{
    background:#111827;
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    font-size:13px;
}
 
button:hover{
    background:#000;
}
 
/* FEEDBACK */
.feedback{
    margin-top:16px;
    padding:14px;
    border-radius:12px;
    display:none;
    font-size:14px;
}
 
.correct{
    background:#ecfdf5;
    border:1px solid #10b981;
}
 
.incorrect{
    background:#fef2f2;
    border:1px solid #ef4444;
}
 
/* UTIL */
.hidden{
    display:none !important;
}
 
.center{
    text-align:center;
}
 
.progress{
    font-size:12px;
    color:#6b7280;
    margin-bottom:10px;
}
 
.footer{
    margin-top:20px;
    display:flex;
    justify-content:flex-end;
}
 
.score-badge{
    font-size:48px;
    margin:20px 0;
}
 
</style>
 
</head>
 
<body>
 
<div class="container">
 
<div class="app">
 
<!-- TOOLBAR -->
<div class="toolbar">
    <div class="brand">THE PERFECT SHOT</div>
    <div class="mode">UX SIMULATION GAME</div>
</div>
 
<div class="workspace">
 
<!-- START -->
<div id="startScreen">
 
    <div class="panel center">
 
        <h1>📸 The Perfect Shot</h1>
 
        <p>
            You are the Creative Director. Choose the strongest visual solution for each brief.
        </p>
 
        <button onclick="startGame()">Start Game</button>
 
    </div>
 
</div>
 
<!-- GAME -->
<div id="game" class="hidden">
 
    <div class="panel">
 
        <div class="progress">
            Round <span id="roundNumber"></span> of <span id="totalRounds"></span>
        </div>
 
        <h2 id="category"></h2>
        <p id="brief"></p>
 
    </div>
 
    <div id="options" class="grid"></div>
 
    <div id="feedback" class="feedback"></div>
 
    <div class="footer">
        <button id="nextBtn" onclick="nextRound()">Next →</button>
    </div>
 
</div>
 
<!-- RESULTS -->
<div id="results" class="hidden">
 
    <div class="panel center">
 
        <h1>Game Complete</h1>
 
        <div class="score-badge">🏆</div>
 
        <h2 id="finalScore"></h2>
        <h3 id="rankTitle"></h3>
        <p id="rankMessage"></p>
 
        <button onclick="location.reload()">Play Again</button>
 
    </div>
 
</div>
 
</div>
</div>
 
</div>
 
<script>
 
const rounds = [
{
category:"People",
brief:"Select the strongest visual representation of an office worker.",
correct:2,
rationale:"Clear, full facial visibility creates a professional and relatable subject.",
options:[
"Images/r1_a.jpg",
"Images/r1_b.jpg",
"Images/r1_c.jpg",
"Images/r1_d.jpg"
]
},
{
category:"Product",
brief:"Choose the best image for a premium skincare banner.",
correct:2,
rationale:"Premium branding requires clarity, lighting, and centered composition.",
options:[
"Images/r2_a.jpg",
"Images/r2_b.jpg",
"Images/r2_c.jpg",
"Images/r2_d.jpg"
]
},
{
category:"Clothing",
brief:"Select the strongest catalog image for a summer dress.",
correct:0,
rationale:"Full-body visibility is essential for fit and silhouette understanding.",
options:[
"Images/r3_a.jpg",
"Images/r3_b.jpg",
"Images/r3_c.jpg",
"Images/r3_d.jpg"
]
},
{
category:"Location",
brief:"Choose the image that best communicates a cozy cafe.",
correct:2,
rationale:"Warm lighting and atmosphere communicate comfort effectively.",
options:[
"Images/r4_a.jpg",
"Images/r4_b.jpg",
"Images/r4_c.jpg",
"Images/r4_d.jpg"
]
},
{
category:"Information",
brief:"Choose the strongest futuristic street visual.",
correct:2,
rationale:"Neon + digital signage clearly communicates futuristic design.",
options:[
"Images/r5_a.jpg",
"Images/r5_b.jpg",
"Images/r5_c.jpg",
"Images/r5_d.jpg"
]
}
];
 
let currentRound = 0;
let score = 0;
let answered = false;
const letters = ["A","B","C","D"];
 
function startGame(){
    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    document.getElementById("totalRounds").textContent = rounds.length;
    loadRound();
}
 
function loadRound(){
 
    answered = false;
 
    const r = rounds[currentRound];
 
    document.getElementById("roundNumber").textContent = currentRound + 1;
    document.getElementById("category").textContent = r.category;
    document.getElementById("brief").textContent = r.brief;
 
    document.getElementById("feedback").style.display = "none";
    document.getElementById("nextBtn").style.display = "none";
 
    const grid = document.getElementById("options");
    grid.innerHTML = "";
 
    r.options.forEach((img, i)=>{
 
        const card = document.createElement("div");
        card.className = "card";
 
        card.innerHTML = `
            <div class="label">${letters[i]}</div>
            <img src="${img}" onerror="this.src='https://via.placeholder.com/600x400?text=Missing+Image'">
        `;
 
        card.onclick = ()=> choose(i);
 
        grid.appendChild(card);
    });
}
 
function choose(i){
 
    if(answered) return;
    answered = true;
 
    const r = rounds[currentRound];
    const fb = document.getElementById("feedback");
 
    if(i === r.correct){
        score++;
        fb.className = "feedback correct";
        fb.innerHTML = `<b>Correct!</b><br>${r.rationale}`;
    } else {
        fb.className = "feedback incorrect";
        fb.innerHTML = `<b>Not quite.</b><br>${r.rationale}`;
    }
 
    fb.style.display = "block";
    document.getElementById("nextBtn").style.display = "inline-block";
}
 
function nextRound(){
 
    currentRound++;
 
    if(currentRound >= rounds.length){
        showResults();
        return;
    }
 
    loadRound();
}
 
function showResults(){
 
    document.getElementById("game").classList.add("hidden");
    document.getElementById("results").classList.remove("hidden");
 
    document.getElementById("finalScore").textContent =
        `Score: ${score} / ${rounds.length}`;
 
    let title = "";
    let msg = "";
 
    if(score >= 5){
        title = "Master Creative Director";
        msg = "Exceptional visual judgment.";
    } else if(score >= 4){
        title = "Senior Art Director";
        msg = "Strong design instincts.";
    } else if(score >= 3){
        title = "Creative Strategist";
        msg = "Good visual reasoning.";
    } else {
        title = "Junior Designer";
        msg = "Keep practicing.";
    }
 
    document.getElementById("rankTitle").textContent = title;
    document.getElementById("rankMessage").textContent = msg;
}
 
</script>
 
</body>
</html>
